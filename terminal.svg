<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <style>
    .term-text {
      font-family: 'Fira Code', Consolas, Monaco, 'Courier New', Courier, monospace;
      font-size: 20px;
      font-weight: 600;
      fill: #00FF00;
    }
    .cursor {
      font-family: 'Fira Code', Consolas, Monaco, 'Courier New', Courier, monospace;
      font-size: 20px;
      fill: #00FF00;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .blinking {
      animation: blink 0.8s step-end infinite;
    }
  </style>

  <!-- Window Frame -->
  <rect width="800" height="120" rx="8" fill="#0D1117" stroke="#00FF00" stroke-width="1.5"/>

  <!-- Header Bar -->
  <path d="M0,8 A8,8 0 0,1 8,0 H792 A8,8 0 0,1 800,8 V30 H0 Z" fill="#161B22"/>

  <!-- Dots -->
  <circle cx="20" cy="15" r="6" fill="#FF5F56"/>
  <circle cx="40" cy="15" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="15" r="6" fill="#27C93F"/>

  <!-- Window Title -->
  <text x="400" y="20" fill="#8B949E" font-family="'Fira Code', Courier, monospace" font-size="14" text-anchor="middle">praveenadapa425@github:~</text>

  <!-- Clip Paths for Typing Effect -->
  <clipPath id="clip1">
    <rect x="100" y="45" height="50" width="0">
      <animate attributeName="width" values="0; 420; 420; 0; 0" keyTimes="0; 0.12; 0.22; 0.25; 1" dur="12s" repeatCount="indefinite" />
    </rect>
  </clipPath>
  <clipPath id="clip2">
    <rect x="100" y="45" height="50" width="0">
      <animate attributeName="width" values="0; 0; 180; 180; 0; 0" keyTimes="0; 0.25; 0.37; 0.47; 0.50; 1" dur="12s" repeatCount="indefinite" />
    </rect>
  </clipPath>
  <clipPath id="clip3">
    <rect x="100" y="45" height="50" width="0">
      <animate attributeName="width" values="0; 0; 310; 310; 0; 0" keyTimes="0; 0.50; 0.62; 0.72; 0.75; 1" dur="12s" repeatCount="indefinite" />
    </rect>
  </clipPath>
  <clipPath id="clip4">
    <rect x="100" y="45" height="50" width="0">
      <animate attributeName="width" values="0; 0; 300; 300; 0" keyTimes="0; 0.75; 0.87; 0.97; 1" dur="12s" repeatCount="indefinite" />
    </rect>
  </clipPath>

  <!-- Opacity Animation for Lines -->
  <g class="term-text" text-anchor="start">
    <!-- Line 1 -->
    <g>
      <animate attributeName="opacity" values="1; 1; 0; 0" keyTimes="0; 0.24; 0.25; 1" dur="12s" repeatCount="indefinite" />
      <text x="100" y="75" clip-path="url(#clip1)">praveenadapa425@github:~$ whoami</text>
      <text x="100" y="75" class="cursor blinking">
        <animate attributeName="x" values="100; 520; 520; 100; 100" keyTimes="0; 0.12; 0.22; 0.25; 1" dur="12s" repeatCount="indefinite" />
        ▋
      </text>
    </g>

    <!-- Line 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.24; 0.25; 0.49; 0.50; 1" dur="12s" repeatCount="indefinite" />
      <text x="100" y="75" clip-path="url(#clip2)">Praveen Adapa</text>
      <text x="100" y="75" class="cursor blinking">
        <animate attributeName="x" values="100; 100; 280; 280; 100; 100" keyTimes="0; 0.25; 0.37; 0.47; 0.50; 1" dur="12s" repeatCount="indefinite" />
        ▋
      </text>
    </g>

    <!-- Line 3 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.50; 0.74; 0.75; 1" dur="12s" repeatCount="indefinite" />
      <text x="100" y="75" clip-path="url(#clip3)">B.Tech CSE (IoT) Student</text>
      <text x="100" y="75" class="cursor blinking">
        <animate attributeName="x" values="100; 100; 410; 410; 100; 100" keyTimes="0; 0.50; 0.62; 0.72; 0.75; 1" dur="12s" repeatCount="indefinite" />
        ▋
      </text>
    </g>

    <!-- Line 4 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.74; 0.75; 0.99; 1" dur="12s" repeatCount="indefinite" />
      <text x="100" y="75" clip-path="url(#clip4)">AWS Certified Developer</text>
      <text x="100" y="75" class="cursor blinking">
        <animate attributeName="x" values="100; 100; 400; 400; 100" keyTimes="0; 0.75; 0.87; 0.97; 1" dur="12s" repeatCount="indefinite" />
        ▋
      </text>
    </g>
  </g>
</svg>
