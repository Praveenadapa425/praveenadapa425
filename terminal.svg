<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="800" height="40">
  <style>
    .term-text {
      font-family: 'Fira Code', Consolas, Monaco, 'Courier New', Courier, monospace;
      font-size: 20px;
      font-weight: 600;
      fill: #00FF00;
    }
    .cursor {
      font-family: 'Fira Code', Consolas, Monaco, 'Courier New', Courier, monospace;
      font-size: 20px;
      fill: #00FF00;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .blinking {
      animation: blink 0.8s step-end infinite;
    }
  </style>

  <!-- Clip Paths for Typing Effect -->
  <clipPath id="clip1">
    <rect x="100" y="0" height="40" width="0">
      <animate attributeName="width" values="0; 330; 330; 0; 0" keyTimes="0; 0.15; 0.30; 0.33; 1" dur="9s" repeatCount="indefinite" />
    </rect>
  </clipPath>
  <clipPath id="clip2">
    <rect x="100" y="0" height="40" width="0">
      <animate attributeName="width" values="0; 0; 310; 310; 0; 0" keyTimes="0; 0.33; 0.48; 0.63; 0.66; 1" dur="9s" repeatCount="indefinite" />
    </rect>
  </clipPath>
  <clipPath id="clip3">
    <rect x="100" y="0" height="40" width="0">
      <animate attributeName="width" values="0; 0; 300; 300; 0" keyTimes="0; 0.66; 0.81; 0.96; 1" dur="9s" repeatCount="indefinite" />
    </rect>
  </clipPath>

  <!-- Opacity Animation for Lines -->
  <g class="term-text" text-anchor="start">
    <!-- Line 1 -->
    <g>
      <animate attributeName="opacity" values="1; 1; 0; 0" keyTimes="0; 0.32; 0.33; 1" dur="9s" repeatCount="indefinite" />
      <text x="100" y="26" clip-path="url(#clip1)">praveen@github:~$ whoami</text>
      <text x="100" y="26" class="cursor blinking">
        <animate attributeName="x" values="100; 430; 430; 100; 100" keyTimes="0; 0.15; 0.30; 0.33; 1" dur="9s" repeatCount="indefinite" />
        ▋
      </text>
    </g>

    <!-- Line 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.32; 0.33; 0.65; 0.66; 1" dur="9s" repeatCount="indefinite" />
      <text x="100" y="26" clip-path="url(#clip2)">B.Tech CSE (IoT) Student</text>
      <text x="100" y="26" class="cursor blinking">
        <animate attributeName="x" values="100; 100; 410; 410; 100; 100" keyTimes="0; 0.33; 0.48; 0.63; 0.66; 1" dur="9s" repeatCount="indefinite" />
        ▋
      </text>
    </g>

    <!-- Line 3 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.65; 0.66; 0.99; 1" dur="9s" repeatCount="indefinite" />
      <text x="100" y="26" clip-path="url(#clip3)">AWS Certified Developer</text>
      <text x="100" y="26" class="cursor blinking">
        <animate attributeName="x" values="100; 100; 400; 400; 100" keyTimes="0; 0.66; 0.81; 0.96; 1" dur="9s" repeatCount="indefinite" />
        ▋
      </text>
    </g>
  </g>
</svg>
