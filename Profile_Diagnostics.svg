<svg xmlns="http://www.w3.org/2000/svg"
     width="1600"
     height="800"
     viewBox="0 0 1600 800"
     fill="none">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090C10"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>

    <!-- Neon Green -->
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8BFF00"/>
      <stop offset="100%" stop-color="#56F000"/>
    </linearGradient>

    <!-- Neon Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card Shadow -->
    <filter id="shadow">
      <feDropShadow
          dx="0"
          dy="0"
          stdDeviation="10"
          flood-color="#8BFF00"
          flood-opacity="0.18"/>
    </filter>

    <style>

      .title{
        font-family:JetBrains Mono,Consolas,monospace;
        font-size:46px;
        font-weight:700;
        fill:url(#green);
      }

      .terminal{
        font-family:JetBrains Mono,Consolas,monospace;
        font-size:28px;
        fill:#7CFC00;
      }

      .heading{
        font-family:JetBrains Mono,Consolas,monospace;
        font-size:25px;
        font-weight:700;
        fill:#8BFF00;
      }

      .text{
        font-family:JetBrains Mono,Consolas,monospace;
        font-size:21px;
        fill:#F3F4F6;
      }

      .bold{
        font-weight:700;
      }

      .label{
        fill:#8BFF00;
        font-weight:700;
      }

    </style>

  </defs>

  <!-- Main Background -->
  <rect
      x="10"
      y="10"
      width="1580"
      height="780"
      rx="24"
      fill="url(#bg)"
      stroke="#7CFC00"
      stroke-width="2"/>

  <!-- Title Icon Placeholder -->
  <rect
      x="60"
      y="48"
      width="40"
      height="40"
      rx="8"
      fill="#10151B"
      stroke="#7CFC00"/>

  <!-- Title -->
  <text
      x="120"
      y="82"
      class="title"
      filter="url(#glow)">
      PROFILE DIAGNOSTICS
  </text>

  <!-- Terminal Command -->
  <text
      x="60"
      y="135"
      class="terminal">
      ❯ cat about.md
  </text>

  <!-- Start Content (Vertical Stack) -->
  <g id="content">

    <!-- ========================================== -->
    <!-- SECTION 1: Education                       -->
    <!-- ========================================== -->
    <rect
        x="60"
        y="175"
        width="80"
        height="80"
        rx="15"
        fill="#10151B"
        stroke="#7CFC00"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Graduation Cap Icon -->
    <g transform="translate(80 185) scale(0.95)">
      <path
        d="M40 8 L8 22 L40 36 L72 22 Z"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linejoin="round"/>
      <path
        d="M18 28 V42 L40 52 L62 42 V28"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linejoin="round"/>
    </g>

    <text x="180" y="200" class="heading">Education</text>
    <text x="180" y="240" class="text">B.Tech in Computer Science (IoT)</text>
    <text x="180" y="275" class="text">Aditya College of Engineering &amp; Technology (2023 – 2027)</text>
    <text x="180" y="310" class="text">
      <tspan class="label">CGPA:</tspan> 8.6 / 10
    </text>

    <!-- ========================================== -->
    <!-- SECTION 2: Current Status                  -->
    <!-- ========================================== -->
    <rect
        x="60"
        y="325"
        width="80"
        height="80"
        rx="15"
        fill="#10151B"
        stroke="#7CFC00"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Search Icon -->
    <g transform="translate(80 338) scale(0.95)">
      <circle
          cx="24"
          cy="24"
          r="18"
          fill="none"
          stroke="#7CFC00"
          stroke-width="4"/>
      <line
          x1="38"
          y1="38"
          x2="56"
          y2="56"
          stroke="#7CFC00"
          stroke-width="4"
          stroke-linecap="round"/>
    </g>

    <text x="180" y="350" class="heading">Current Status</text>
    <text x="180" y="390" class="text">Final-year Computer Science undergraduate</text>
    <text x="180" y="425" class="text">Open to Software Engineering,</text>
    <text x="180" y="460" class="text">Backend and Cloud Engineering roles</text>

    <!-- ========================================== -->
    <!-- SECTION 3: Location                        -->
    <!-- ========================================== -->
    <rect
        x="60"
        y="475"
        width="80"
        height="80"
        rx="15"
        fill="#10151B"
        stroke="#7CFC00"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Location Pin Icon -->
    <g transform="translate(80 488) scale(0.95)">
      <path
        d="M30 6 C18 6 10 15 10 28 C10 47 30 68 30 68 C30 68 50 47 50 28 C50 15 42 6 30 6Z"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linejoin="round"/>
      <circle
        cx="30"
        cy="28"
        r="8"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"/>
    </g>

    <text x="180" y="500" class="heading">Location</text>
    <text x="180" y="540" class="text">Kakinada, Andhra Pradesh, India</text>
    <text x="180" y="575" class="text">Open to Remote • Hybrid • On-site</text>

    <!-- ========================================== -->
    <!-- SECTION 4: About                           -->
    <!-- ========================================== -->
    <rect
        x="60"
        y="600"
        width="80"
        height="80"
        rx="15"
        fill="#10151B"
        stroke="#7CFC00"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Light Bulb Icon -->
    <g transform="translate(80 613) scale(0.95)">
      <path
        d="M30 8 C18 8 10 18 10 30 C10 39 14 45 20 50 C23 53 24 57 24 60 H36 C36 57 37 53 40 50 C46 45 50 39 50 30 C50 18 42 8 30 8Z"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linejoin="round"/>
      <line
        x1="24"
        y1="66"
        x2="36"
        y2="66"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linecap="round"/>
      <line
        x1="25"
        y1="74"
        x2="35"
        y2="74"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linecap="round"/>
    </g>

    <text x="180" y="625" class="heading">About</text>
    <text x="180" y="665" class="text">Building secure, scalable backend systems,</text>
    <text x="180" y="700" class="text">cloud-native applications, and AI solutions.</text>

  </g>

  <!-- Bottom Accent Line -->
  <line
      x1="60"
      y1="745"
      x2="1540"
      y2="745"
      stroke="#7CFC00"
      stroke-width="1.5"
      opacity="0.35"/>

</svg>
