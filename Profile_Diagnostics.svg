<svg xmlns="http://www.w3.org/2000/svg"
     width="1200"
     height="600"
     viewBox="0 0 1200 600"
     fill="none">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090C10"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>

    <!-- Neon Green -->
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8BFF00"/>
      <stop offset="100%" stop-color="#56F000"/>
    </linearGradient>

    <!-- Neon Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card Shadow -->
    <filter id="shadow">
      <feDropShadow
          dx="0"
          dy="0"
          stdDeviation="6"
          flood-color="#8BFF00"
          flood-opacity="0.18"/>
    </filter>

    <style>

      .title{
        font-family:JetBrains Mono,Consolas,monospace;
        font-size:32px;
        font-weight:700;
        fill:url(#green);
      }

      .terminal{
        font-family:JetBrains Mono,Consolas,monospace;
        font-size:20px;
        fill:#7CFC00;
      }

      .heading{
        font-family:JetBrains Mono,Consolas,monospace;
        font-size:18px;
        font-weight:700;
        fill:#8BFF00;
      }

      .text{
        font-family:JetBrains Mono,Consolas,monospace;
        font-size:15px;
        fill:#F3F4F6;
      }

      .bold{
        font-weight:700;
      }

      .label{
        fill:#8BFF00;
        font-weight:700;
      }

    </style>

  </defs>

  <!-- Main Background -->
  <rect
      x="10"
      y="10"
      width="1180"
      height="580"
      rx="16"
      fill="url(#bg)"
      stroke="#7CFC00"
      stroke-width="2"/>

  <!-- Title Icon Container -->
  <rect
      x="40"
      y="38"
      width="32"
      height="32"
      rx="6"
      fill="#10151B"
      stroke="#7CFC00"/>
  <!-- Person Icon -->
  <g transform="translate(40 38)" stroke="#7CFC00" stroke-width="2.5" fill="none">
    <circle cx="16" cy="11" r="5" />
    <path d="M 6 26 C 6 20, 26 20, 26 26" stroke-linecap="round" />
  </g>

  <!-- Title -->
  <text
      x="85"
      y="62"
      class="title"
      filter="url(#glow)">
      PROFILE DIAGNOSTICS
  </text>

  <!-- Terminal Command -->
  <text
      x="40"
      y="110"
      class="terminal">
      ❯ cat about.md
  </text>

  <!-- Start Content (Vertical Stack) -->
  <g id="content">

    <!-- ========================================== -->
    <!-- SECTION 1: Education                       -->
    <!-- ========================================== -->
    <rect
        x="40"
        y="135"
        width="60"
        height="60"
        rx="12"
        fill="#10151B"
        stroke="#7CFC00"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Graduation Cap Icon -->
    <g transform="translate(48 148) scale(0.55)">
      <path
        d="M40 8 L8 22 L40 36 L72 22 Z"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linejoin="round"/>
      <path
        d="M18 28 V42 L40 52 L62 42 V28"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linejoin="round"/>
    </g>

    <text x="120" y="150" class="heading">Education</text>
    <text x="120" y="180" class="text">B.Tech in Computer Science (IoT)</text>
    <text x="120" y="205" class="text">Aditya College of Engineering &amp; Technology (2023 – 2027)</text>
    <text x="120" y="230" class="text">
      <tspan class="label">CGPA:</tspan> 8.6 / 10
    </text>

    <!-- ========================================== -->
    <!-- SECTION 2: Current Status                  -->
    <!-- ========================================== -->
    <rect
        x="40"
        y="260"
        width="60"
        height="60"
        rx="12"
        fill="#10151B"
        stroke="#7CFC00"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Search Icon -->
    <g transform="translate(53 273) scale(0.55)">
      <circle
          cx="24"
          cy="24"
          r="18"
          fill="none"
          stroke="#7CFC00"
          stroke-width="4"/>
      <line
          x1="38"
          y1="38"
          x2="56"
          y2="56"
          stroke="#7CFC00"
          stroke-width="4"
          stroke-linecap="round"/>
    </g>

    <text x="120" y="275" class="heading">Current Status</text>
    <text x="120" y="305" class="text">Final-year Computer Science undergraduate</text>
    <text x="120" y="330" class="text">Open to Software Engineering,</text>
    <text x="120" y="355" class="text">Backend and Cloud Engineering roles</text>

    <!-- ========================================== -->
    <!-- SECTION 3: Location                        -->
    <!-- ========================================== -->
    <rect
        x="40"
        y="385"
        width="60"
        height="60"
        rx="12"
        fill="#10151B"
        stroke="#7CFC00"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Location Pin Icon -->
    <g transform="translate(53 395) scale(0.55)">
      <path
        d="M30 6 C18 6 10 15 10 28 C10 47 30 68 30 68 C30 68 50 47 50 28 C50 15 42 6 30 6Z"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linejoin="round"/>
      <circle
        cx="30"
        cy="28"
        r="8"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"/>
    </g>

    <text x="120" y="400" class="heading">Location</text>
    <text x="120" y="430" class="text">Kakinada, Andhra Pradesh, India</text>
    <text x="120" y="455" class="text">Open to Remote • Hybrid • On-site</text>

    <!-- ========================================== -->
    <!-- SECTION 4: About                           -->
    <!-- ========================================== -->
    <rect
        x="40"
        y="485"
        width="60"
        height="60"
        rx="12"
        fill="#10151B"
        stroke="#7CFC00"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Light Bulb Icon -->
    <g transform="translate(53 492) scale(0.55)">
      <path
        d="M30 8 C18 8 10 18 10 30 C10 39 14 45 20 50 C23 53 24 57 24 60 H36 C36 57 37 53 40 50 C46 45 50 39 50 30 C50 18 42 8 30 8Z"
        fill="none"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linejoin="round"/>
      <line
        x1="24"
        y1="66"
        x2="36"
        y2="66"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linecap="round"/>
      <line
        x1="25"
        y1="74"
        x2="35"
        y2="74"
        stroke="#7CFC00"
        stroke-width="4"
        stroke-linecap="round"/>
    </g>

    <text x="120" y="500" class="heading">About</text>
    <text x="120" y="530" class="text">Building secure, scalable backend systems,</text>
    <text x="120" y="555" class="text">cloud-native applications, and AI solutions.</text>

  </g>

  <!-- Bottom Accent Line -->
  <line
      x1="40"
      y1="585"
      x2="1160"
      y2="585"
      stroke="#7CFC00"
      stroke-width="1.5"
      opacity="0.35"/>

</svg>
